<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email | MoyaJobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .otp-input::-webkit-outer-spin-button,
        .otp-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-br from-brand-500 to-amber-500 p-8 text-center text-white">
                <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 backdrop-blur-md">
                    <i class="bi bi-shield-check text-4xl"></i>
                </div>
                <h1 class="text-2xl font-bold mb-2">Verify Your Email</h1>
                <p class="text-white/90 text-sm">We've sent a 6-digit code to</p>
                <p class="text-white font-semibold mt-1">{{ email }}</p>
            </div>

            <!-- Form -->
            <div class="p-8">
                {% if error %}
                <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-4 text-sm flex items-center gap-2">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                <form method="post" id="otpForm" class="space-y-6">
                    {% csrf_token %}
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                            Enter Verification Code
                        </label>
                        {{ form.otp }}
                        <p class="text-xs text-slate-400 mt-2 text-center">
                            Code expires in 10 minutes
                        </p>
                    </div>

                    <button type="submit" id="verifyBtn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-brand-600 transition-all shadow-lg flex items-center justify-center gap-2">
                        <span>Verify & Continue</span>
                        <i class="bi bi-arrow-right"></i>
                    </button>
                </form>

                <div class="mt-6 text-center space-y-3">
                    <p class="text-sm text-slate-500">Didn't receive the code?</p>
                    <button id="resendBtn" class="text-brand-600 font-bold text-sm hover:underline flex items-center justify-center gap-1 mx-auto">
                        <i class="bi bi-envelope"></i>
                        <span>Resend OTP</span>
                    </button>
                    <a href="{% url 'jobs:home' %}" class="text-slate-400 text-xs hover:text-slate-600 block mt-4">
                        ← Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Auto-format OTP input
        const otpInput = document.querySelector('input[name="otp"]');
        otpInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
        
        otpInput.addEventListener('paste', function(e) {
            e.preventDefault();
            const pasted = (e.clipboardData || window.clipboardData).getData('text');
            this.value = pasted.replace(/[^0-9]/g, '').slice(0, 6);
        });

        // Auto-focus on load
        window.addEventListener('load', () => otpInput.focus());

        // AJAX form submission
        document.getElementById('otpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const btn = document.getElementById('verifyBtn');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split animate-spin"></i> Verifying...';

            fetch("{% url 'jobs:verify_otp' %}", {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': formData.get('csrfmiddlewaretoken'),
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    btn.innerHTML = '<i class="bi bi-check-circle-fill"></i> Verified!';
                    setTimeout(() => window.location.href = data.redirect, 800);
                } else {
                    alert(data.message);
                    btn.disabled = false;
                    btn.innerHTML = '<span>Verify & Continue</span><i class="bi bi-arrow-right"></i>';
                    otpInput.value = '';
                    otpInput.focus();
                }
            })
            .catch(err => {
                alert('Network error. Please try again.');
                btn.disabled = false;
                btn.innerHTML = '<span>Verify & Continue</span><i class="bi bi-arrow-right"></i>';
            });
        });

        // Resend OTP
        document.getElementById('resendBtn').addEventListener('click', function() {
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split animate-spin"></i> Sending...';

            fetch("{% url 'jobs:resend_otp' %}", {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}',
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(r => r.json())
            .then(data => {
                alert(data.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-envelope"></i><span>Resend OTP</span>';
            });
        });
    </script>
</body>
</html>
