{% extends "admin/index.html" %}
{% load static %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
        <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-2">Total Users</h3>
        <p class="text-3xl font-black text-slate-900">{{ total_users|default:0 }}</p>
    </div>
    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
        <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-2">Total Jobs</h3>
        <p class="text-3xl font-black text-slate-900">{{ total_jobs|default:0 }}</p>
    </div>
</div>
{{ block.super }}
{% endblock %}
