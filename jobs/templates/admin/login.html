{% extends "admin/login.html" %}
{% load static %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-50">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md border border-slate-200">
        <div class="text-center mb-8">
            <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-brand-500 to-amber-500 flex items-center justify-center text-white shadow-md mx-auto">
                <i class="bi bi-stars text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 mt-4">MoyaJobs Admin</h1>
            <p class="text-slate-500 text-sm">Sign in to manage the platform</p>
        </div>

        {% if form.errors %}
        <div class="bg-rose-50 border border-rose-200 text-rose-700 p-3 rounded-lg mb-4 text-sm">
            <i class="bi bi-exclamation-triangle-fill mr-2"></i> Please enter the correct username and password.
        </div>
        {% endif %}

        <form action="{{ app_path }}" method="post" id="login-form">
            {% csrf_token %}
            <div class="mb-4">
                <label for="id_username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input type="text" name="username" id="id_username" class="w-full border border-slate-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" autofocus required>
            </div>
            <div class="mb-4">
                <label for="id_password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" name="password" id="id_password" class="w-full border border-slate-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" required>
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="w-full py-3 bg-brand-500 hover:bg-brand-600 text-white font-bold rounded-lg transition-colors shadow-sm">
                <i class="bi bi-box-arrow-in-right mr-2"></i> Log In
            </button>
        </form>
    </div>
</div>
{% endblock %}
